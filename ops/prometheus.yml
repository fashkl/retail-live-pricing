global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:
  - job_name: retail-live-pricing
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app:8383"]
