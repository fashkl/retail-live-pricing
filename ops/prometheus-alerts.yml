groups:
  - name: retail-live-pricing-business-slos
    interval: 30s
    rules:
      - alert: TickToScreenP95High
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(business_tick_to_screen_latency_ms_seconds_bucket[5m]))
          ) * 1000 > 500
        for: 5m
        labels:
          severity: warning
          service: retail-live-pricing
          slo: tick-to-screen-latency
        annotations:
          summary: "Tick-to-screen p95 latency is above 500ms"
          description: "p95 tick-to-screen latency exceeded target for 5m. Check streaming gateway, Kafka lag, and app load."
          runbook_url: "https://github.com/fashkl/retail-live-pricing/blob/main/docs/runbooks/alerts.md#ticktoscreenp95high"

      - alert: TickToScreenP99Critical
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (rate(business_tick_to_screen_latency_ms_seconds_bucket[5m]))
          ) * 1000 > 900
        for: 5m
        labels:
          severity: critical
          service: retail-live-pricing
          slo: tick-to-screen-latency
        annotations:
          summary: "Tick-to-screen p99 latency is critically high"
          description: "p99 tick-to-screen latency exceeded 900ms for 5m. User experience likely degraded."
          runbook_url: "https://github.com/fashkl/retail-live-pricing/blob/main/docs/runbooks/alerts.md#ticktoscreenp99critical"

      - alert: PortfolioRecalcP95High
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(business_portfolio_recalc_delay_ms_seconds_bucket[5m]))
          ) * 1000 > 2000
        for: 5m
        labels:
          severity: warning
          service: retail-live-pricing
          slo: portfolio-recalc-delay
        annotations:
          summary: "Portfolio recalc p95 delay is above 2s"
          description: "Portfolio recomputation delay is elevated; check calc consumer throughput and fanout pressure."
          runbook_url: "https://github.com/fashkl/retail-live-pricing/blob/main/docs/runbooks/alerts.md#portfoliorecalcp95high"

      - alert: WsUpdateFailureRatioHigh
        expr: |
          (
            sum(rate(business_updates_failed_total[5m])) /
            clamp_min(sum(rate(business_updates_delivered_total[5m]) + rate(business_updates_failed_total[5m])), 1)
          ) > 0.02
        for: 5m
        labels:
          severity: critical
          service: retail-live-pricing
          slo: ws-delivery
        annotations:
          summary: "WebSocket update failure ratio is above 2%"
          description: "Failed update ratio exceeded 2% for 5m. Check WS connection stability and downstream backpressure."
          runbook_url: "https://github.com/fashkl/retail-live-pricing/blob/main/docs/runbooks/alerts.md#wsupdatefailureratiohigh"

      - alert: StaleUpdatesSpike
        expr: sum(rate(business_stale_updates_total[5m])) > 1
        for: 5m
        labels:
          severity: warning
          service: retail-live-pricing
          slo: feed-freshness
        annotations:
          summary: "Stale update rate is elevated"
          description: "Stale updates rate exceeded 1 update/sec over 5m. Investigate ingestion freshness and feed quality."
          runbook_url: "https://github.com/fashkl/retail-live-pricing/blob/main/docs/runbooks/alerts.md#staleupdatesspike"

      - alert: ConflationDropRatioHigh
        expr: |
          (
            sum(rate(business_conflation_dropped_total[10m])) /
            clamp_min(sum(rate(business_conflation_input_total[10m])), 1)
          ) > 0.40
        for: 10m
        labels:
          severity: warning
          service: retail-live-pricing
          slo: conflation-quality
        annotations:
          summary: "Conflation drop ratio is high"
          description: "More than 40% of input ticks are being dropped over 10m. Review conflation window and throughput."
          runbook_url: "https://github.com/fashkl/retail-live-pricing/blob/main/docs/runbooks/alerts.md#conflationdropratiohigh"

      - alert: RetailLivePricingTargetDown
        expr: up{job="retail-live-pricing"} == 0
        for: 2m
        labels:
          severity: critical
          service: retail-live-pricing
          slo: availability
        annotations:
          summary: "Retail Live Pricing metrics target is down"
          description: "Prometheus cannot scrape the retail-live-pricing target for more than 2 minutes."
          runbook_url: "https://github.com/fashkl/retail-live-pricing/blob/main/docs/runbooks/alerts.md#retaillivepricingtargetdown"

      - alert: KafkaConsumerLagHigh
        expr: max(kafka_consumer_fetch_manager_records_lag_max{job="retail-live-pricing"}) > 1000
        for: 5m
        labels:
          severity: warning
          service: retail-live-pricing
          slo: kafka-consumer-lag
        annotations:
          summary: "Kafka consumer lag is elevated"
          description: "Max consumer lag exceeded 1,000 records for 5m. Check consumer throughput and partition skew."
          runbook_url: "https://github.com/fashkl/retail-live-pricing/blob/main/docs/runbooks/alerts.md#kafkaconsumerlaghigh"

      - alert: KafkaConsumerLagCritical
        expr: max(kafka_consumer_fetch_manager_records_lag_max{job="retail-live-pricing"}) > 5000
        for: 2m
        labels:
          severity: critical
          service: retail-live-pricing
          slo: kafka-consumer-lag
        annotations:
          summary: "Kafka consumer lag is critically high"
          description: "Max consumer lag exceeded 5,000 records for 2m. User-facing latency risk is high."
          runbook_url: "https://github.com/fashkl/retail-live-pricing/blob/main/docs/runbooks/alerts.md#kafkaconsumerlagcritical"
