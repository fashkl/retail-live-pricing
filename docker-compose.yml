version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: live-pricing-postgres
    environment:
      POSTGRES_DB: live_pricing
      POSTGRES_USER: pricing
      POSTGRES_PASSWORD: pricing
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricing -d live_pricing"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: live-pricing-redis
    command: [ "redis-server", "--requirepass", "${SPRING_DATA_REDIS_PASSWORD:-SeCrET}" ]
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.8.0
    container_name: live-pricing-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: live-pricing-kafka-ui
    ports:
      - "5777:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.3.1
    container_name: live-pricing-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "12345:12345"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./ops/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.0
    container_name: live-pricing-tempo
    command: [ "-config.file=/etc/tempo/tempo.yml" ]
    ports:
      - "3200:3200"
    volumes:
      - ./ops/tempo-config.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    container_name: live-pricing-loki
    command: [ "-config.file=/etc/loki/local-config.yaml" ]
    ports:
      - "3100:3100"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: live-pricing-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--enable-feature=exemplar-storage"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app
      - alloy
      - tempo
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: live-pricing-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: live-pricing-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/live_pricing
      SPRING_DATASOURCE_USERNAME: pricing
      SPRING_DATASOURCE_PASSWORD: pricing
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${CACHE_REDIS_PASS:-SeCrET}
      QUEUE_REDIS_URL: ${QUEUE_REDIS_URL:-redis://:${CACHE_REDIS_PASS:-SeCrET}@redis:6379/4}
      CACHE_REDIS_HOST: redis
      CACHE_REDIS_PORT: 6379
      CACHE_REDIS_PASS: ${CACHE_REDIS_PASS:-SeCrET}
      OTEL_SERVICE_NAME: retail-live-pricing
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local,service.version=0.1.0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_INSTRUMENTATION_KAFKA_ENABLED: "true"
      OTEL_INSTRUMENTATION_JDBC_ENABLED: "true"
      OTEL_INSTRUMENTATION_LETTUCE_ENABLED: "true"
      OTEL_LOGS_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_TRACES_SAMPLER: always_on
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      alloy:
        condition: service_started

volumes:
  tempo-data:
  grafana-data:
